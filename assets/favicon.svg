<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1f2933"/>
  <!-- Garage door panel representation -->
  <!-- Door frame -->
  <rect x="10" y="14" width="44" height="36" rx="2" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <!-- Horizontal panel lines -->
  <line x1="10" y1="23" x2="54" y2="23" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="41" x2="54" y2="41" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Vertical dividers upper panels -->
  <line x1="27" y1="14" x2="27" y2="23" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="37" y1="14" x2="37" y2="23" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Vertical dividers mid panels -->
  <line x1="27" y1="23" x2="27" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="37" y1="23" x2="37" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom accent bar -->
  <rect x="10" y="50" width="44" height="4" rx="2" fill="#c0392b"/>
</svg>
